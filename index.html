<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trending Meme Tracker</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="app">
        <!-- Header -->
        <header>
            <div class="header-content">
                <h1>Trending Meme Tracker</h1>
                <p class="subtitle">Live trending content from Mastodon &amp; Bluesky</p>
            </div>
        </header>

        <!-- Main Content -->
        <main>
            <!-- Platform Selector -->
            <section id="platform-section">
                <h2>Select Platforms</h2>
                <div id="platform-grid"></div>
                <button id="scan-btn" class="btn btn-primary btn-large" disabled>
                    Scan for Trending Content
                </button>
            </section>

            <!-- Results -->
            <section id="results-section" class="hidden">
                <div class="results-header">
                    <h2>Trending Now</h2>
                    <button id="new-scan-btn" class="btn btn-secondary">New Scan</button>
                </div>
                <div id="loading" class="hidden">
                    <div class="spinner"></div>
                    <p id="loading-text">Fetching trending content...</p>
                </div>
                <div id="results-container"></div>
            </section>
        </main>

        <!-- Footer -->
        <footer>
            <p>Direct from public APIs &middot; No API key required</p>
        </footer>
    </div>

    <script src="platforms.js"></script>
    <script src="api.js"></script>
    <script src="app.js"></script>
</body>
</html>
